name: budgi
version: 1.0.1+6
publish_to: none
description: A new Flutter project.
environment:
  sdk: ^3.9.2

dependencies:
  cloud_firestore: 6.1.2
  connectivity_plus: 7.0.0
  cupertino_icons: ^1.0.8
  currency_text_input_formatter: 2.3.0
  firebase_auth: 6.1.4
  firebase_core: 4.4.0
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  flutter_facebook_auth: 7.1.5
  flutter_launcher_icons: 0.14.4
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.0.10+1
  format_indonesia_v2: 0.0.8
  get: 4.7.3
  get_storage: ^2.1.1
  google_fonts: 8.0.2
  google_mlkit_text_recognition: ^0.13.0
  google_generative_ai: ^0.4.3
  google_sign_in: 6.2.1
  http: ^1.6.0
  image_picker: 1.2.1
  intl: 0.20.2
  intl_phone_number_input_v2: 0.0.9
  introduction_screen: 4.0.0
  lottie: 3.3.2
  material_charts: ^0.0.39
  salomon_bottom_bar: 3.3.2
  syncfusion_flutter_charts: 32.2.9
  syncfusion_flutter_datepicker: 32.2.8

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_icons:
  image_path: assets/logo/logo.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/logo/logo.png
  web:
    image_path: path/to/image.png
    background_color: "#hexcode"
    theme_color: "#hexcode"
    generate: true
  windows:
    image_path: path/to/image.png
    generate: true
    icon_size: 48
  macos:
    image_path: path/to/image.png
    generate: true
  android: true
  ios: true
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  assets:
    - assets/icons/
    - assets/lottie/
    - assets/logo/
    - .env
  uses-material-design: true
